apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: progressive-delivery-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ankit-chauhan2/canary-rollout-demo.git 
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
